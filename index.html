<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ============================================
       META TAGS KHUSUS WHATSAPP LINK PREVIEW
       ============================================
       WhatsApp membaca Open Graph (og:) tags.
       Pastikan:
       - og:image minimal 300x200px, maks 5MB
       - og:image harus URL absolut (https://)
       - Halaman harus bisa diakses publik (bukan localhost)
  ============================================ -->

  <!-- Judul yang muncul di preview WA -->
  <meta property="og:title"       content="Wedding Invitation" />

  <!-- Deskripsi singkat di bawah judul -->
  <meta property="og:description" content="Kami mengundang Anda untuk hadir di hari bahagia kami." />

  <!-- URL halaman ini (harus absolut) -->
  <meta property="og:url"         content="https://nikiboyx.github.io/tag-meta/" />

  <!-- Gambar thumbnail (WAJIB untuk preview WA) -->
  <meta property="og:image"       content="https://nikiboyx.github.io/tag-meta/cover.webp" />

  <!-- Lebar & tinggi gambar (opsional tapi disarankan) -->
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type"   content="image/webp" />

  <!-- Tipe konten -->
  <meta property="og:type"        content="website" />

  <!-- Nama website -->
  <meta property="og:site_name"   content="Wedding Invitation" />

  <!-- Locale (opsional) -->
  <meta property="og:locale"      content="id_ID" />

  <!-- Judul tab browser -->
  <title>Wedding Invitation</title>
</head>
<body>
  <h1>Halaman Undangan</h1>
  <p>Konten undangan pernikahan ada di sini.</p>
</body>
</html>
